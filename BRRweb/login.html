<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Barangay Admin Dashboard</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            background: #1f2d3d;
            color: white;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
        }

        .sidebar a:hover {
            background: #1abc9c;
        }

        .content {
            margin-left: 250px;
            padding: 20px;
        }

        .card-box {
            border-radius: 10px;
            color: white;
        }

        .bg-blue { background: #3498db; }
        .bg-green { background: #2ecc71; }
        .bg-orange { background: #f39c12; }
        .bg-red { background: #e74c3c; }

        .navbar {
            margin-left: 250px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar p-3">
    <h4 class="text-center mb-4">ADMIN PANEL</h4>

    <a href="#"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="#"><i class="bi bi-people"></i> Residents</a>
    <a href="#"><i class="bi bi-person-gear"></i> Users</a>
    <a href="#"><i class="bi bi-house"></i> Households</a>
    <a href="#"><i class="bi bi-file-earmark-text"></i> Reports</a>
    <a href="#"><i class="bi bi-gear"></i> Settings</a>
    <a href="#"><i class="bi bi-box-arrow-right"></i> Logout</a>
</div>

<!-- TOP NAVBAR -->
<nav class="navbar navbar-light bg-white shadow-sm px-3">
    <span class="navbar-brand mb-0 h1">Barangay Residents Record System</span>

    <div>
        <i class="bi bi-bell fs-5 me-3"></i>
        <span class="fw-bold">Admin</span>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="content">

    <!-- DASHBOARD CARDS -->
    <div class="row g-3 mb-4">

        <div class="col-md-3">
            <div class="p-3 card-box bg-blue">
                <h6>Total Residents</h6>
                <h3>1,250</h3>
                <i class="bi bi-people fs-2"></i>
            </div>
        </div>

        <div class="col-md-3">
            <div class="p-3 card-box bg-green">
                <h6>Users</h6>
                <h3>15</h3>
                <i class="bi bi-person-gear fs-2"></i>
            </div>
        </div>

        <div class="col-md-3">
            <div class="p-3 card-box bg-orange">
                <h6>Households</h6>
                <h3>320</h3>
                <i class="bi bi-house fs-2"></i>
            </div>
        </div>

        <div class="col-md-3">
            <div class="p-3 card-box bg-red">
                <h6>Reports</h6>
                <h3>8</h3>
                <i class="bi bi-file-earmark-text fs-2"></i>
            </div>
        </div>

    </div>

    <!-- RESIDENTS TABLE -->
    <div class="card shadow-sm">
        <div class="card-header bg-white">
            <h5 class="mb-0">Residents List</h5>
        </div>

        <div class="card-body">

            <button class="btn btn-success mb-3">
                <i class="bi bi-plus-circle"></i> Add Resident
            </button>

            <table class="table table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Gender</th>
                        <th>Address</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Juan Dela Cruz</td>
                        <td>30</td>
                        <td>Male</td>
                        <td>Purok 1</td>
                        <td>
                            <button class="btn btn-primary btn-sm">Edit</button>
                            <button class="btn btn-danger btn-sm">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
