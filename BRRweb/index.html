<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay Resident System - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-gradient">
    <div class="container">
        <div class="login-container">
            <div class="card login-card animate__animated animate__fadeIn">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-home fa-4x text-primary mb-3"></i>
                        <h2>Barangay Resident System</h2>
                        <p class="text-muted">Please sign in to continue</p>
                    </div>
                    
                    <form id="loginForm">
                        <div class="mb-4">
                            <label class="form-label fw-bold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" class="form-control" id="username" placeholder="admin / staff" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="password" placeholder="Enter password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </button>
                    </form>

                    <div id="message" class="mt-3"></div>
                    
                    <div class="mt-4 text-center">
                        <small class="text-muted">
                            Test Accounts:<br>
                            <strong>admin / admin123</strong> | <strong>staff / staff123</strong>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // ✅ FIXED LOGIN - Works with your API
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            await loginUser();
        });

        async function loginUser() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const messageDiv = document.getElementById("message");

            try {
                messageDiv.innerHTML = `
                    <div class="alert alert-info d-flex align-items-center">
                        <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                        Logging in...
                    </div>`;

                // ✅ TRY BOTH HTTP AND HTTPS
                const apiUrls = [
                    "http://localhost:7283/api/auth/login",
                    "https://localhost:7283/api/auth/login"
                ];

                let response;
                for (const url of apiUrls) {
                    try {
                        console.log(`Trying: ${url}`);
                        response = await fetch(url, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ username, password })
                        });
                        if (response.ok) break;
                    } catch (e) {
                        console.log(`Failed ${url}:`, e.message);
                        continue;
                    }
                }

                if (!response?.ok) {
                    const data = await response.json();
                    throw new Error(data.message || `HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                
                // ✅ Store token and user
                localStorage.setItem("token", data.token || "temp-token");
                localStorage.setItem("user", JSON.stringify(data.user || { username }));

                messageDiv.innerHTML = `
                    <div class="alert alert-success d-flex align-items-center">
                        <i class="fas fa-check-circle me-2"></i>
                        Login successful! Redirecting...
                    </div>`;

                setTimeout(() => window.location.href = "dashboard.html", 1500);

            } catch (error) {
                console.error("Login Error:", error);
                messageDiv.innerHTML = `
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        ${error.message}
                        <br><small>Make sure API is running on port 7283</small>
                    </div>`;
            }
        }
    </script>
</body>
</html>
