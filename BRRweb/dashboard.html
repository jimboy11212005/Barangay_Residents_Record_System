<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Barangay System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="#">
                <i class="fas fa-home me-2"></i>Barangay Resident System
            </a>
            <div class="navbar-nav ms-auto" id="userInfo">
                <span class="navbar-text me-3" id="welcomeUser"></span>
                <button class="btn btn-outline-light" onclick="logout()">
                    <i class="fas fa-sign-out-alt me-1"></i>Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <!-- Stats Cards -->
        <div class="row mb-5" id="statsCards">
            <div class="col-xl-2 col-md-3 col-sm-6 mb-3">
                <div class="card bg-primary text-white shadow">
                    <div class="card-body">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h5>Total Residents</h5>
                                <h2 id="totalResidents">0</h2>
                            </div>
                            <i class="fas fa-users fa-2x opacity-75"></i>
                        </div>
                    </div>
                </div>
            </div>
            <!-- More stat cards... -->
        </div>

        <!-- Quick Actions -->
        <div class="row mb-4">
            <div class="col-md-3 mb-3">
                <a href="residents.html" class="card h-100 text-decoration-none">
                    <div class="card-body text-center">
                        <i class="fas fa-users fa-3x text-primary mb-3"></i>
                        <h5>Manage Residents</h5>
                    </div>
                </a>
            </div>
            <div class="col-md-3 mb-3">
                <a href="households.html" class="card h-100 text-decoration-none">
                    <div class="card-body text-center">
                        <i class="fas fa-home fa-3x text-success mb-3"></i>
                        <h5>Households</h5>
                    </div>
                </a>
            </div>
        </div>

        <!-- Recent Residents -->
        <div class="card shadow">
            <div class="card-header bg-white border-0">
                <h5 class="mb-0"><i class="fas fa-list me-2"></i>Recent Residents</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Age</th>
                                <th>Status</th>
                                <th>Household</th>
                            </tr>
                        </thead>
                        <tbody id="recentResidents"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Check auth
        if (!localStorage.getItem('token')) {
            window.location.href = 'index.html';
        }

        // Load dashboard
        document.addEventListener('DOMContentLoaded', loadDashboard);

        async function loadDashboard() {
            try {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                document.getElementById('welcomeUser').textContent = `Welcome, ${user.username || 'User'}`;

                const response = await apiRequest('/dashboard/stats');
                const stats = await response.json();
                
                document.getElementById('totalResidents').textContent = stats.totalResidents || 0;
                // Add more stats...
            } catch (error) {
                console.error('Dashboard load error:', error);
            }
        }
    </script>
</body>
</html>
