<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay Records - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .register-card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(25px);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            max-width: 450px;
            width: 100%;
            overflow: hidden;
        }
        .card-header-custom {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 2.5rem 2rem;
            text-align: center;
        }
        .btn-register {
            background: linear-gradient(135deg, #28a745, #20c997);
            border: none;
            border-radius: 16px;
            padding: 14px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-register:not(:disabled):hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(40,167,69,0.4);
        }
        .form-control:focus {
            border-color: #11998e;
            box-shadow: 0 0 0 0.25rem rgba(17,153,142,0.25);
        }
        .input-group-text i {
            color: #6c757d;
        }
        .switch-link {
            color: #11998e;
            font-weight: 600;
            text-decoration: none;
        }
        .switch-link:hover {
            text-decoration: underline;
        }
        #registerSpinner {
            width: 1.2rem;
            height: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="register-card mx-4">
        <!-- Header -->
        <div class="card-header-custom">
            <i class="fas fa-user-plus fa-3x mb-3"></i>
            <h2 class="mb-1 fw-bold">Create Account</h2>
            <p class="mb-0 opacity-90 fs-6">Join Barangay Resident System</p>
        </div>

        <!-- Form -->
        <div class="card-body p-4 p-md-5">
            <form id="registerForm">
                <!-- Full Name -->
                <div class="mb-4">
                    <label for="fullname" class="form-label fw-semibold fs-6">Full Name</label>
                    <div class="input-group input-group-lg">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" class="form-control" id="fullname" placeholder="Enter full name" required minlength="2">
                    </div>
                </div>

                <!-- Username -->
                <div class="mb-4">
                    <label for="username" class="form-label fw-semibold fs-6">Username</label>
                    <div class="input-group input-group-lg">
                        <span class="input-group-text"><i class="fas fa-user-tag"></i></span>
                        <input type="text" class="form-control" id="username" placeholder="Choose username" required minlength="3">
                    </div>
                    <div class="form-text">Minimum 3 characters</div>
                </div>

                <!-- Password -->
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold fs-6">Password</label>
                    <div class="input-group input-group-lg">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="Choose password" required minlength="6">
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="form-text">Minimum 6 characters</div>
                </div>

                <!-- Error Messages -->
                <div id="errorMsg" class="alert alert-danger d-none mb-4" role="alert"></div>

                <!-- Register Button -->
                <button type="submit" class="btn btn-register w-100 mb-4 px-5 py-3" id="registerBtn">
                    <span id="registerText">Create Account</span>
                    <span id="registerSpinner" class="spinner-border spinner-border-sm ms-2" role="status" style="display:none;"></span>
                </button>
            </form>

            <!-- Footer -->
            <div class="text-center">
                <small class="text-muted">Already have an account?</small><br>
                <a href="index.html" class="switch-link fs-6">Sign In Here</a>
            </div>
        </div>
    </div>

    <!-- SAME BEAUTIFUL UI FROM BEFORE -->
<script>
const API_URL = "http://localhost:7283/api";

document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const fullname = document.getElementById("fullname").value;
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const errorMsg = document.getElementById("errorMsg");

    try {
        errorMsg.classList.add("d-none");

        const response = await fetch(`${API_URL}/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                fullName: fullname,
                username: username,
                password: password
            })
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.message || "Registration failed");
        }

        alert("✅ Registered successfully!");
        window.location.href = "index.html";

    } catch (error) {
        errorMsg.classList.remove("d-none");
        errorMsg.textContent = error.message;
    }
});
</script>
</body>
</html>
